<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabaseUrl = "https://jwljahlhbyfdrtsxseeg.supabase.co"
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3bGphaGxoYnlmZHJ0c3hzZWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA4OTE2MTcsImV4cCI6MjA1NjQ2NzYxN30.FrT1skDMwh8dCves5ST-4wV6be3ul428GOvFFuRXkGU"
  const supabase = createClient(supabaseUrl, supabaseKey)

  async function resetPassword() {
    const params = new URLSearchParams(window.location.hash.substring(1))
    const token = params.get('token')

    if (!token) {
      document.getElementById("status").textContent = "Invalid or expired link."
      return
    }

    const { data, error: exchangeError } = await supabase.auth.exchangeCodeForSession(token)
    if (exchangeError) {
      document.getElementById("status").textContent = "Error: " + exchangeError.message
      return
    }

    const newPassword = document.getElementById("newPassword").value
    if (!newPassword) {
      document.getElementById("status").textContent = "Enter a new password."
      return
    }

    const { error: updateError } = await supabase.auth.updateUser({ password: newPassword })
    if (updateError) {
      document.getElementById("status").textContent = "Error: " + updateError.message
    } else {
      document.getElementById("status").textContent = "Password updated!"
    }
  }

window.resetPassword = resetPassword

</script>

</head>
<body>
  <h1>Reset Password</h1>
  <input id="newPassword" type="password" placeholder="Enter new password" />
  <button onclick="resetPassword()">Submit</button>
  <p id="status"></p>
</body>
</html>
