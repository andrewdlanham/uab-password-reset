<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Debug Reset</title>
</head>
<body>
  <h1>Debug Password Reset</h1>
  <p id="hashDisplay">Hash: <em>none yet</em></p>
  <script>
    // On page load
    window.addEventListener("DOMContentLoaded", () => {
      const hash = window.location.hash;  // everything after #
      document.getElementById("hashDisplay").textContent = "Hash: " + hash;
      console.log("DEBUG — window.location.hash:", hash);
    });
  </script>
</body>
</html>
