<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabaseUrl = "https://jwljah3hbyfdrtsxse5g.supabase.co"
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3bGphaGxoYnlmZHJ0c3hzZWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA4OTE2MTcsImV4cCI6MjA1NjQ2NzYxN30.FrT1skDMwh8dCves5ST-4wV6be3ul428GOvFFuRXkGU"
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function resetPassword() {
      const params = new URLSearchParams(window.location.hash.substring(1))
      const accessToken = params.get("access_token")
      const refreshToken = params.get("refresh_token")
      const type = params.get("type")

      if (!accessToken || !refreshToken || type !== "recovery") {
        document.getElementById("status").textContent = "Invalid or expired link."
        return
      }

      // Set the session with the tokens from the URL
      const { error: sessionError } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      })

      if (sessionError) {
        document.getElementById("status").textContent = "Error: " + sessionError.message
        return
      }

      const newPassword = document.getElementById("newPassword").value
      if (!newPassword) {
        document.getElementById("status").textContent = "Enter a new password."
        return
      }

      // Update the password
      const { error: updateError } = await supabase.auth.updateUser({ password: newPassword })
      if (updateError) {
        document.getElementById("status").textContent = "Error: " + updateError.message
      } else {
        document.getElementById("status").textContent = "✅ Password updated! You can now log in."
      }
    }

    window.resetPassword = resetPassword
  </script>
</head>
<body>
  <h1>Reset Password</h1>
  <input id="newPassword" type="password" placeholder="Enter new password" />
  <button onclick="resetPassword()">Submit</button>
  <p id="status"></p>
</body>
</html>
